name: Sincronização Diária Kenlo CRM

on:
  schedule:
    # Rodar todos os dias às 09:00 UTC (06:00 BRT)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Permissão de push para o bot do GitHub

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar Sincronização Kenlo
        run: node import-kenlo.js

      - name: Commitar e Enviar Alterações
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add imoveis-data.js vivareal.xml kenlo.xml
          if ! git diff --quiet HEAD; then
            git commit -m "chore: sync imóveis Kenlo (GitHub Action)"
            git push origin main
          else
            echo "Nenhuma alteração detectada no banco de dados."
          fi
